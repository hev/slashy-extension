<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Slashy options</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        color: #0f172a;
        padding: 16px;
        min-width: 320px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        background: #6366f1;
        color: white;
        border-radius: 5px;
        font-weight: 700;
      }
      fieldset {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 12px;
      }
      legend {
        padding: 0 6px;
        color: #64748b;
        font-size: 12px;
      }
      label {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        padding: 6px 0;
        cursor: pointer;
      }
      label small {
        display: block;
        color: #64748b;
        font-size: 11px;
      }
      .saved {
        color: #16a34a;
        font-size: 11px;
        margin-top: 8px;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .saved.show {
        opacity: 1;
      }
      .footer {
        margin-top: 12px;
        color: #94a3b8;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1><span class="mark">/</span> Slashy</h1>
    <fieldset>
      <legend>When I open gmail.com</legend>
      <label>
        <input type="radio" name="redirectMode" value="ask" />
        <div>Ask me<small>Show a banner with an "Open in Slashy" button</small></div>
      </label>
      <label>
        <input type="radio" name="redirectMode" value="always" />
        <div>Always redirect<small>Take me straight to Slashy</small></div>
      </label>
      <label>
        <input type="radio" name="redirectMode" value="never" />
        <div>Never<small>Leave Gmail alone</small></div>
      </label>
      <div class="saved" id="saved">Saved</div>
    </fieldset>
    <div class="footer">Launcher: type <code>slashy</code> in the address bar, or press <code>⌘⇧L</code>.</div>
    <script src="options.js"></script>
  </body>
</html>
